name: Football Auto Pipeline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn gspread google-auth joblib requests

      # =========================
      # CREATE GOOGLE CREDS
      # =========================
      - name: Create credentials
        run: |
          echo "${GOOGLE_CREDENTIALS}" > credentials.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      # =========================
      # FETCH DATA
      # =========================
      - name: Run fetch
        run: python fetch.py
        env:
          SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_TOKEN }}

      # =========================
      # TRAIN MODEL
      # =========================
      - name: Run training
        run: python train.py

      # =========================
      # SAVE MODEL TO REPO
      # =========================
      - name: Commit model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add model.pkl
          git commit -m "auto update model" || echo "no changes"
          git push
