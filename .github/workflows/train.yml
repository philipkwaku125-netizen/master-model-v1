name: Auto Train Model

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3AM UTC
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Add credentials file
        run: |
          echo "${{ secrets.GOOGLE_CREDS }}" > credentials.json

      - name: Run training
        run: |
          python train.py

      - name: Commit model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto retrain model" || echo "no changes"
          git push
