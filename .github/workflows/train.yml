name: Auto Train Model

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn gspread google-auth joblib requests

      # =========================
      # SAFE CREDENTIAL CREATION
      # =========================
      - name: Create credentials file safely
        run: |
          echo "${GOOGLE_CREDENTIALS}" > credentials.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      # =========================
      # VERIFY DATA BEFORE TRAINING
      # =========================
      - name: Run data check
        run: |
          python -c "import gspread, json; print('Credentials OK')"

      # =========================
      # RUN TRAINING
      # =========================
      - name: Run training
        run: python train.py

      # =========================
      # COMMIT MODEL ONLY IF EXISTS
      # =========================
      - name: Commit model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add model.pkl || echo "no model"
          git commit -m "auto retrain model" || echo "no changes"
          git push 
