name: Daily Football Pipeline

on:
  schedule:
    - cron: "0 3 * * *"  # Runs daily at 03:00 UTC
  workflow_dispatch:     # This lets you run it manually to test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install gspread oauth2client requests pandas

      - name: Decode Google Credentials
        run: echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > credentials.json

      - name: Run Bot Script
        run: python .py
