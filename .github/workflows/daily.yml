name: Daily Football Pipeline

on:
  schedule:
    - cron: "0 3 * * *"  # Runs daily at 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests pandas  # Add any other libraries you use

      - name: Decode Google Credentials
        run: echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > credentials.json

      - name: Run Script
        run: python your_script_name.py  # Change this to your actual file name
